<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{PRESENTATION_NAME}}</title>
  <script type="application/json" id="__pdata__">{{PRESENTATION_DATA_JSON}}</script>
  <style>
    :root {
      --green-deep: #1a3c3a;
      --green-mid:  #2C4A48;
      --green-light: #7fb3af;
      --green-pale: #e8ebe8;
      --red:        #FF6359;
      --amber:      #F0A500;
      --text-body:  #3d5c5a;
      --text-muted: #7a9896;
      --bg-page:    #2C4A48;
      --bg-card:    #ffffff;
      --border:     #dde3dd;
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes nodeSlideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes borderTrace {
      from { background-position: 0% 0%; }
      to   { background-position: 200% 0%; }
    }
    @keyframes dotPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.2); }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-page);
      color: var(--text-body);
      overflow: hidden;
    }

    /* ── Header ── */
    #pres-header {
      height: 56px;
      background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 100%);
      border-bottom: 1px solid rgba(0,0,0,0.1);
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
      flex-shrink: 0;
      position: relative;
      animation: fadeInDown 0.6s var(--ease-out-expo);
      overflow: hidden;
    }

    #pres-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--red) 0%, #ff9c96 25%, var(--red) 50%, var(--amber) 100%);
      background-size: 200% 100%;
      animation: borderTrace 12s linear infinite;
    }

    /* ── Body layout ── */
    #pres-body { display: flex; height: calc(100vh - 56px); }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      background: var(--bg-page);
      border-right: 2px solid var(--green-mid);
      overflow-y: auto;
      padding: 16px 8px;
      flex-shrink: 0;
      box-shadow: 2px 0 8px rgba(0,0,0,0.08);
      position: relative;
      z-index: 100;
      transition: transform 0.3s var(--ease-out-quart), box-shadow 0.3s var(--ease-out-quart);
      will-change: transform;
    }

    #sidebar.collapsed { transform: translateX(-280px); }

    #sidebar.collapsed.hover-revealed {
      transform: translateX(0);
      box-shadow: 2px 0 16px rgba(0,0,0,0.15);
    }

    #sidebar::-webkit-scrollbar { width: 6px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: rgba(127,179,175,0.3); border-radius: 3px; }
    #sidebar::-webkit-scrollbar-thumb:hover { background: rgba(127,179,175,0.5); }

    /* ── Toggle button ── */
    .sidebar-toggle {
      width: 32px; height: 32px; padding: 0;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      z-index: 101;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .sidebar-toggle:hover  { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.4); transform: scale(1.05); }
    .sidebar-toggle:focus  { outline: 2px solid rgba(255,255,255,0.6); outline-offset: 2px; }

    /* ── Content ── */
    #content {
      flex: 1;
      overflow: hidden;
      background: var(--bg-card);
      position: relative;
      animation: fadeIn 0.5s var(--ease-out-expo) 0.2s both;
    }

    #slide-frame {
      width: 100%; height: 100%;
      border: none;
      background: var(--bg-card);
    }

    /* ── Tree ── */
    .tree-node {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      user-select: none;
      border-left: 2px solid transparent;
      margin-left: -2px;
      transition: background 0.15s var(--ease-out-quart), color 0.15s var(--ease-out-quart), transform 0.15s var(--ease-out-quart);
      animation: nodeSlideIn 0.4s var(--ease-out-expo) backwards;
    }
    .tree-node:hover  { background: rgba(127,179,175,0.08); color: var(--text-body); transform: translateY(-1px); }
    .tree-node.active { background: rgba(255,99,89,0.08); color: var(--red); border-left-color: var(--red); font-weight: 600; }

    .tree-node .icon {
      font-size: 11px; width: 16px; flex-shrink: 0;
      color: var(--text-muted);
      transition: transform 0.2s var(--ease-out-quart), color 0.15s var(--ease-out-quart);
    }
    .tree-node:hover .icon { color: var(--red); }

    .tree-node .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.15s var(--ease-out-quart), transform 0.2s var(--ease-out-quart);
    }
    .tree-node.has-slide .dot { background: var(--red); animation: dotPulse 2s ease-in-out infinite; }

    .tree-children {
      padding-left: 16px;
      max-height: 2000px;
      transition: max-height 0.3s var(--ease-out-quart), opacity 0.3s var(--ease-out-quart);
      opacity: 1;
    }
    .tree-children.hidden { max-height: 0; opacity: 0; overflow: hidden; }
  </style>
</head>
<body>
  <header id="pres-header">
    <span id="pres-title">{{PRESENTATION_NAME}}</span>
    <button class="sidebar-toggle" aria-label="Toggle navigation sidebar" aria-expanded="true" title="Toggle sidebar">
      <span>⋮</span>
    </button>
  </header>
  <div id="pres-body">
    <aside id="sidebar">
      <div id="tree-root"></div>
    </aside>
    <main id="content">
      <iframe id="slide-frame" title="Slide content"></iframe>
    </main>
  </div>

  <script>
(function () {
  // ── Sample data (used when template tokens are unresolved for direct preview) ──
  function _sampleData() {
    const slide = function (id, label, hasSlide, children) {
      return { id, label, hasSlide: !!hasSlide, children: children || [] };
    };
    return {
      meta: { name: 'Sample Presentation', publishedAt: new Date().toISOString() },
      tree: [
        slide('frontpage', 'Front Page', true),
        slide('nfr', 'Non-Functional Requirements', false, [
          slide('nfr-accessibility',   'Accessibility',          true),
          slide('nfr-extensibility',   'Extensibility',          true),
          slide('nfr-maintainability', 'Maintainability',        true),
          slide('nfr-reliability',     'Reliability',            true),
          slide('nfr-security',        'Security',               true),
        ]),
        slide('revenue', 'Core Revenue Management', false, [
          slide('rev-billing',     'Billing & Installments',   true),
          slide('rev-pi',          'Penalty & Interest',       true),
          slide('rev-registration','Registration',             true),
        ]),
        slide('supporting', 'Core Supporting Capabilities', false, [
          slide('sup-batch', 'Batch Processing', true),
          slide('sup-case',  'Case Management',  true),
        ]),
      ],
    };
  }

  // ── Load data ──
  function loadData() {
    const el  = document.getElementById('__pdata__');
    const raw = el ? el.textContent.trim() : '';
    if (!raw || raw.startsWith('{{')) return _sampleData();
    try { return JSON.parse(raw); } catch { return _sampleData(); }
  }

  const data = loadData();

  // ── Populate header title ──
  const titleEl = document.getElementById('pres-title');
  if (titleEl) {
    const name = data.meta && data.meta.name;
    if (name) titleEl.textContent = name;
  }

  // ── DOM refs ──
  const frame      = document.getElementById('slide-frame');
  const sidebar    = document.getElementById('sidebar');
  const presBody   = document.getElementById('pres-body');
  const toggleBtn  = document.querySelector('.sidebar-toggle');

  // ── Sidebar ──
  let sidebarCollapsed = false;
  let revealTimeout    = null;

  function applySidebarState() {
    sidebar.classList.toggle('collapsed', sidebarCollapsed);
    presBody.classList.toggle('sidebar-collapsed', sidebarCollapsed);
    if (toggleBtn) toggleBtn.setAttribute('aria-expanded', String(!sidebarCollapsed));
    if (!sidebarCollapsed) sidebar.classList.remove('hover-revealed');
    try { localStorage.setItem('solon-sidebar-collapsed', sidebarCollapsed); } catch {}
  }

  function toggleSidebar() {
    sidebarCollapsed = !sidebarCollapsed;
    applySidebarState();
  }

  // Restore saved state
  try {
    if (localStorage.getItem('solon-sidebar-collapsed') === 'true') {
      sidebarCollapsed = true;
      applySidebarState();
    }
  } catch {}

  if (toggleBtn) {
    toggleBtn.addEventListener('click', toggleSidebar);
    toggleBtn.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleSidebar(); }
    });
  }

  // Hover-reveal when collapsed
  document.addEventListener('mousemove', function (e) {
    if (!sidebarCollapsed) return;
    if (e.clientX < 20) {
      clearTimeout(revealTimeout);
      sidebar.classList.add('hover-revealed');
    } else {
      clearTimeout(revealTimeout);
      revealTimeout = setTimeout(function () {
        sidebar.classList.remove('hover-revealed');
      }, 300);
    }
  });

  // ── Slide scaling ──
  function scaleFrame() {
    try {
      const doc = frame.contentDocument || frame.contentWindow.document;
      if (!doc) return;
      const body = doc.body;
      if (body) { body.style.minHeight = 'auto'; body.style.padding = '0'; body.style.margin = '0'; body.style.overflow = 'hidden'; }
      const html = doc.documentElement;
      if (html) html.style.overflow = 'hidden';
    } catch {}
  }
  window.addEventListener('resize', scaleFrame);
  frame.addEventListener('load', scaleFrame);

  // ── Navigation ──
  function firstSlide(nodes) {
    for (const n of nodes) {
      if (n.hasSlide) return n;
      const found = firstSlide(n.children || []);
      if (found) return found;
    }
    return null;
  }

  let activeId = null;
  function navigate(id) {
    activeId = id;
    frame.src = 'slides/' + id + '.html';
    document.querySelectorAll('.tree-node').forEach(function (el) { el.classList.remove('active'); });
    const el = document.querySelector('[data-id="' + id + '"]');
    if (el) el.classList.add('active');
  }

  // ── Tree builder ──
  function buildTree(nodes, container) {
    nodes.forEach(function (node) {
      const wrap = document.createElement('div');
      const row  = document.createElement('div');
      row.className = 'tree-node' + (node.hasSlide ? ' has-slide' : '');
      row.dataset.id = node.id;

      const icon = document.createElement('span');
      icon.className = 'icon';
      const hasChildren = node.children && node.children.length > 0;
      icon.textContent = hasChildren ? '▶' : '';
      row.appendChild(icon);

      const dot = document.createElement('span');
      dot.className = 'dot';
      row.appendChild(dot);

      const label = document.createElement('span');
      label.textContent = node.label;
      row.appendChild(label);

      const childWrap = document.createElement('div');
      childWrap.className = 'tree-children hidden';

      if (hasChildren) {
        buildTree(node.children, childWrap);
        icon.addEventListener('click', function (e) {
          e.stopPropagation();
          const hidden = childWrap.classList.toggle('hidden');
          icon.textContent = hidden ? '▶' : '▼';
        });
      }

      row.addEventListener('click', function () {
        if (node.hasSlide) {
          navigate(node.id);
        } else {
          const first = firstSlide(node.children || []);
          if (first) navigate(first.id);
          if (hasChildren) {
            childWrap.classList.remove('hidden');
            icon.textContent = '▼';
          }
        }
      });

      wrap.appendChild(row);
      wrap.appendChild(childWrap);
      container.appendChild(wrap);
    });
  }

  // ── Boot ──
  const root = document.getElementById('tree-root');
  buildTree(data.tree, root);

  // Expand all and navigate to first slide
  const first = firstSlide(data.tree);
  if (first) {
    document.querySelectorAll('.tree-children').forEach(function (el) { el.classList.remove('hidden'); });
    document.querySelectorAll('.tree-node .icon').forEach(function (el) { if (el.textContent === '▶') el.textContent = '▼'; });
    navigate(first.id);
  }
})();
  </script>
</body>
</html>
