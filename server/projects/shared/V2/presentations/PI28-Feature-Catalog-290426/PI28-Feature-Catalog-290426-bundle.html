      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.15s var(--ease-out-quart), transform 0.2s var(--ease-out-quart);
    }

    .tree-node.has-slide .dot {
      background: var(--red);
      animation: dotPulse 2s ease-in-out infinite;
    }

    .tree-children {
      padding-left: 16px;
      max-height: 1000px;
      transition: max-height 0.3s var(--ease-out-quart), opacity 0.3s var(--ease-out-quart);

    }

    .tree-children.hidden {
      max-height: 0;
      opacity: 0;
      display: none;
    }

\n\n    rows.forEach(r => tbody.appendChild(r));\n\n    document.querySelectorAll('thead th.sortable').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));\n    th.classList.add(ascending ? 'sort-asc' : 'sort-desc');\n\n    if (!animate) return;\n\n    // FLIP — invert + play\n    rows.forEach(r => {\n      const prevTop = first.get(r);\n      const nextTop = r.getBoundingClientRect().top;\n      const delta   = prevTop - nextTop;\n      if (delta === 0) return;\n\n      r.animate(\n        [\n          { transform: `translateY(${delta}px)`, opacity: 0.55 },\n          { transform: 'translateY(0)',           opacity: 1    }\n        ],\n        { duration: 380, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'none' }\n      );\n    });\n  }\n\n  document.querySelectorAll('thead th.sortable').forEach(th => {\n    let asc = false;\n    th.addEventListener('click', () => {\n      asc = !asc;\n      sortBy(th, asc, true);\n    });\n  });\n\n  // Default: sort by Effort descending (no animation on load)\n  const effortTh = document.querySelector('thead th[data-type=\"effort\"]');\n  sortBy(effortTh, false, false);\n<\/script>\n</body>\n</html>","sr-261b44c1-0898-493a-8ff9-b5b242d94bfe":"<!DOCTYPE html>\n<html>\n<head>\n  <meta charset=\"UTF-8\"/>\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"/>\n  <title>Slide 2</title>\n\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Core Revenue Management – Feature Catalog</title>\n<style>\n  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  body {\n    font-family: 'Inter', sans-serif;\n    background: #e8e8e8;\n    display: flex;\n    justify-content: center;\n    align-items: center;\n    min-height: 100vh;\n    padding: 20px;\n  }\n  .slide {\n    width: 1280px;\n    height: 720px;\n    background: #ffffff;\n    position: r ompany</span></div>\n</section>\n<script>\n  const STATUS_ORDER = { 'In Progress': 0, 'In Analysis': 1, 'To Do': 2 };\n\n  function getCellValue(row, col, type) {\n    const td = row.querySelectorAll('td')[col];\n    if (type === 'pi') {\n      const text = td.querySelector('.pi-text').textContent.trim();\n      return parseInt(text.replace(/\\D/g, ''), 10);\n    }\n    if (type === 'effort') {\n      const text = td.querySelector('.effort-pill').textContent.trim();\n      if (text === 'TBD') return Infinity;\n      return parseInt(text.replace(/[^0-9]/g, ''), 10);\n    }\n    if (type === 'status') {\n      const text = td.querySelector('.status-badge').textContent.trim();\n      return STATUS_ORDER[text] ?? 99;\n    }\n    if (type === 'priority') {\n      const text = td.querySelector('.prio-badge').textContent.trim();\n      return parseInt(text.replace(/\\D/g, ''), 10);\n    }\n    if (type === 'number') {\n      return parseInt(td.querySelector('.feat-count').textContent.trim(), 10);\n    }\n    return td.textContent.trim();\n  }\n\n  function sortBy(th, ascending, animate) {\n    const col   = parseInt(th.dataset.col, 10);\n    const type  = th.dataset.type;\n    const tbody = th.closest('table').querySelector('tbody');\n    const rows  = Array.from(tbody.querySelectorAll('tr'));\n\n    // FLIP — record positions before sort\n    const first = animate ? new Map(rows.map(r => [r, r.getBoundingClientRect().top])) : null;\n\n    rows.sort((a, b) => {\n      const va = getCellValue(a, col, type);\n      const vb = getCellValue(b, col, type);\n      if (va === vb) return 0;\n      return (va < vb ? -1 : 1) * (ascending ? 1 : -1);\n    });\n\n    rows.forEach(r => tbody.appendChild(r));\n\n    document.querySelectorAll('thead th.sortable').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));\n    th.classList.add(ascending ? 'sort-asc' : 'sort-desc');\n\n    if (!animate) return;\n\n    // FLIP — invert + play\n    rows.forEach(r => {\n      const prevTop = first.get(r);\n      const nextTop = r.getBoundingClientRect().top;\n      const delta   = prevTop - nextTop;\n      if (delta === 0) return;\n\n      r.animate(\n        [\n          { transform: `translateY(${delta}px)`, opacity: 0.55 },\n          { transform: 'translateY(0)',           opacity: 1    }\n        ],\n        { duration: 380, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'none' }\n      );\n    });\n  }\n\n  document.querySelectorAll('thead th.sortable').forEach(th => {\n    let asc = false;\n    th.addEventListener('click', () => {\n      asc = !asc;\n      sortBy(th, asc, true);\n    });\n  });\n\n  // Default: sort by Effort descending (no animation on load)\n  const effortTh = document.querySelector('thead th[data-type=\"effort\"]');\n  sortBy(effortTh, false, false);\n<\/script>\n</body>\n</html>","sr-28230897-1bb0-4b05-b99a-4e9c0aecc5af":"<!DOCTYPE html>\n<html>\n<head>\n  <meta charset=\"UTF-8\"/>\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"/>\n  <title>Slide 2</title>\n\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Maintainability Enhancements – Feature Catalog</title>\n<style>\n  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  body {\n    font-family: 'Inter', sans-serif;\n    background: #e8e8e8;\n    display: flex;\n    justify-content: center;\n    align-items: center;\n    min-height: 100vh;\n    padding: 20px;\n  }\n  .slide {\n    width: 1280px;\n    height: 720px;\n    background: #ffffff;\n    position: relative;\n    overflow: hidden;\n    box-shadow: 0 8px 40px rgba(0,0,0,0.18);\n  }\n\n  /* ── TOP BAR ── */\n  .top-bar {\n    position: absolute;\n    top: 0; left: 0; right: 0;\n    height: 7px;\n    background: #FF6359;\n  }\n\n  /* ── HEADER ── */\n  .header {\n    position: absolute;\n    top: 7px; left: 0; right: 0;\n  const text = td.querySelector('.pi-text').textContent.trim();\n      return parseInt(text.replace(/\\D/g, ''), 10);\n    }\n    if (type === 'effort') {\n      const text = td.querySelector('.effort-pill').textContent.trim();\n      if (text === 'TBD') return Infinity;\n      return parseInt(text.replace(/[^0-9]/g, ''), 10);\n    }\n    if (type === 'status') {\n      const text = td.querySelector('.status-badge').textContent.trim();\n      return STATUS_ORDER[text] ?? 99;\n    }\n    if (type === 'priority') {\n      const text = td.querySelector('.prio-badge').textContent.trim();\n      return parseInt(text.replace(/\\D/g, ''), 10);\n    }\n    if (type === 'number') {\n      return parseInt(td.querySelector('.feat-count').textContent.trim(), 10);\n    }\n    return td.textContent.trim();\n  }\n\n  function sortBy(th, ascending, animate) {\n    const col   = parseInt(th.dataset.col, 10);\n    const type  = th.dataset.type;\n    const tbody = th.closest('table').querySelector('tbody');\n    const rows  = Array.from(tbody.querySelectorAll('tr'));\n\n    // FLIP — record positions before sort\n    const first = animate ? new Map(rows.map(r => [r, r.getBoundingClientRect().top])) : null;\n\n    rows.sort((a, b) => {\n      const va = getCellValue(a, col, type);\n      const vb = getCellValue(b, col, type);\n      if (va === vb) return 0;\n      return (va < vb ? -1 : 1) * (ascending ? 1 : -1);\n    });\n\n    rows.forEach(r => tbody.appendChild(r));\n\n    document.querySelectorAll('thead th.sortable').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));\n    th.classList.add(ascending ? 'sort-asc' : 'sort-desc');\n\n    if (!animate) return;\n\n    // FLIP — invert + play\n    rows.forEach(r => {\n      const prevTop = first.get(r);\n      const nextTop = r.getBoundingClientRect().top;\n      const delta   = prevTop - nextTop;\n      if (delta === 0) return;\n\n      r.animate(\n        [\n          { transform: `translateY(${delta}px)`, opacity: 0.55 },\n s-badge').textContent.trim();\n      return STATUS_ORDER[text] ?? 99;\n    }\n    if (type === 'priority') {\n      const text = td.querySelector('.prio-badge').textContent.trim();\n      return parseInt(text.replace(/\\D/g, ''), 10);\n    }\n    if (type === 'number') {\n      return parseInt(td.querySelector('.feat-count').textContent.trim(), 10);\n    }\n    return td.textContent.trim();\n  }\n\n  function sortBy(th, ascending, animate) {\n    const col   = parseInt(th.dataset.col, 10);\n    const type  = th.dataset.type;\n    const tbody = th.closest('table').querySelector('tbody');\n    const rows  = Array.from(tbody.querySelectorAll('tr'));\n\n    // FLIP — record positions before sort\n    const first = animate ? new Map(rows.map(r => [r, r.getBoundingClientRect().top])) : null;\n\n    rows.sort((a, b) => {\n      const va = getCellValue(a, col, type);\n      const vb = getCellValue(b, col, type);\n      if (va === vb) return 0;\n      return (va < vb ? -1 : 1) * (ascending ? 1 : -1);\n    });\n\n    rows.forEach(r => tbody.appendChild(r));\n\n    document.querySelectorAll('thead th.sortable').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));\n    th.classList.add(ascending ? 'sort-asc' : 'sort-desc');\n\n    if (!animate) return;\n\n    // FLIP — invert + play\n    rows.forEach(r => {\n      const prevTop = first.get(r);\n      const nextTop = r.getBoundingClientRect().top;\n      const delta   = prevTop - nextTop;\n      if (delta === 0) return;\n\n      r.animate(\n        [\n          { transform: `translateY(${delta}px)`, opacity: 0.55 },\n          { transform: 'translateY(0)',           opacity: 1    }\n        ],\n        { duration: 380, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'none' }\n      );\n    });\n  }\n\n  document.querySelectorAll('thead th.sortable').forEach(th => {\n    let asc = false;\n    th.addEventListener('click', () => {\n      asc = !asc;\n      sortBy(th, asc, true);\n    });\n  });\n\n  // Default: sort by Effort d <body>
   <header id="pres-header">
      <span>PI28-Feature-Catalog-290426</span>
      <button class="sidebar-toggle" aria-label="Toggle navigation sidebar" aria-expanded="false" title="Toggle sidebar">
        <span class="toggle-icon">⋮</span>
      </button>
    </header>
    <div id="pres-body">
      <aside id="sidebar">
        <div id="tree-root"></div>
      </aside>
      <main id="content"><iframe id="slide-frame"></iframe></main>
    </div>
   <script>
(function() {
  const data = window.__PRESENTATION__;
  if (!data) { console.error('No presentation data'); return; }

  const frame = document.getElementById('slide-frame');
  const content = document.getElementById('content');
  const sidebar = document.getElementById('sidebar');
  const presBody = document.getElementById('pres-body');
  const toggleButton = document.querySelector('.sidebar-toggle');

  // ── Sidebar State Management ──
  let sidebarCollapsed = false;
  let revealTimeout = null;
  const REVEAL_THRESHOLD = 20;
  const REVEAL_HIDE_DELAY = 300;

  // Load sidebar state from localStorage
  function loadSidebarState() {
    try {
      const saved = localStorage.getItem('solon-sidebar-collapsed');
      if (saved === 'true') {
        sidebarCollapsed = true;
        sidebar.classList.add('collapsed');
        presBody.classList.add('sidebar-collapsed');
        updateToggleButton();
      }
    } catch (e) {
      // localStorage may be unavailable
    }
  }

  // Save sidebar state to localStorage
  function saveSidebarState() {
    try {
      localStorage.setItem('solon-sidebar-collapsed', sidebarCollapsed);
    } catch (e) {
      // localStorage may be unavailable
    }
  }

  // Update toggle button state
  function updateToggleButton() {
    if (toggleButton) {
      toggleButton.setAttribute('aria-expanded', !sidebarCollapsed);
    }
  }

   // Toggle sidebar handler
   function toggleSidebar() {
     sidebarCollapsed = !sidebarCollapsed;
     
     if (sidebarCollapsed) {
       sidebar.classList.add('collapsed');
       presBody.classList.add('sidebar-collapsed');
       console.log('[DEBUG] Sidebar collapsed - transform should be translateX(-280px)');
     } else {
       sidebar.classList.remove('collapsed');
       sidebar.classList.remove('hover-revealed');
       presBody.classList.remove('sidebar-collapsed');
       console.log('[DEBUG] Sidebar expanded - transform should be translateX(0)');
     }
     
     // Force reflow to ensure CSS is applied
     void sidebar.offsetHeight;
     
     const computed = window.getComputedStyle(sidebar);
     console.log('[DEBUG] Current transform:', computed.transform);
     
     updateToggleButton();
     saveSidebarState();
   }

   // Toggle button click handler
   console.log('[DEBUG] Setting up toggle button handler');
   const btn = document.querySelector('.sidebar-toggle');
   console.log('[DEBUG] Button element found:', btn);
   
   if (btn) {
     btn.addEventListener('click', function(e) {
       console.log('[DEBUG] Button CLICKED - calling toggleSidebar()');
       e.preventDefault();
       e.stopPropagation();
       toggleSidebar();
     });
     
     // Also add a direct onclick handler as backup
     btn.onclick = function(e) {
       console.log('[DEBUG] Button onclick handler fired');
       e.preventDefault();
       e.stopPropagation();
       toggleSidebar();
       return false;
     };
     
     btn.addEventListener('keydown', function(e) {
       if (e.key === 'Enter' || e.key === ' ') {
         e.preventDefault();
         toggleSidebar();
       }
     });
     console.log('[DEBUG] Button handlers attached successfully');
   } else {
     console.error('[ERROR] Toggle button NOT FOUND - cannot attach handler');
   }

  // Hover reveal handler
  document.addEventListener('mousemove', function(e) {
    if (!sidebarCollapsed) return;
    
    if (e.clientX < REVEAL_THRESHOLD) {
      clearTimeout(revealTimeout);
      sidebar.classList.add('hover-revealed');
    } else {
      revealTimeout = setTimeout(function() {
        sidebar.classList.remove('hover-revealed');
      }, REVEAL_HIDE_DELAY);
    }
  });

  function scaleFrame() {
    try {
      const slideContent = frame.contentDocument || frame.contentWindow.document;
      if (!slideContent) return;

      // Reset slide body to prevent overflow and scrollbars
      const bodyEl = slideContent.body;
      if (bodyEl) {
        bodyEl.style.minHeight = 'auto';
        bodyEl.style.padding = '0';
        bodyEl.style.margin = '0';
        bodyEl.style.overflow = 'hidden';
        bodyEl.style.background = 'transparent';
      }

      // Reset html too
      const htmlEl = slideContent.documentElement;
      if (htmlEl) {
        htmlEl.style.overflow = 'hidden';
      }

      // Override slide element background
      const slideEl = slideContent.querySelector('.slide');
      if (slideEl) {
        slideEl.style.background = '#ffffff';
      }
    } catch (e) {
      // On error, just let it be
    }
  }
  window.addEventListener('resize', scaleFrame);

  function firstSlide(nodes) {
    for (const n of nodes) {
      if (n.hasSlide) return n;
      const found = firstSlide(n.children || []);
      if (found) return found;
    }
    return null;
  }

  let activeId = null;
  function navigate(id) {
    activeId = id;
    const slideHtml = window.__SLIDES__[id];
    if (slideHtml !== undefined) {
      frame.srcdoc = slideHtml;
    } else {
      frame.src = 'slides/' + id + '.html';
    }
    document.querySelectorAll('.tree-node').forEach(el => el.classList.remove('active'));
    const el = document.querySelector('[data-id="' + id + '"]');
    if (el) el.classList.add('active');
  }

  function buildTree(nodes, container) {
    nodes.forEach(function(node) {
      const wrap = document.createElement('div');
      const row = document.createElement('div');
      row.className = 'tree-node' + (node.hasSlide ? ' has-slide' : '');
      row.dataset.id = node.id;

      const icon = document.createElement('span');
      icon.className = 'icon';
      const hasChildren = node.children && node.children.length > 0;
      icon.textContent = hasChildren ? '▶' : '';
      row.appendChild(icon);

      const dot = document.createElement('span');
      dot.className = 'dot';
      row.appendChild(dot);

      const label = document.createElement('span');
      label.textContent = node.label;
      row.appendChild(label);

      const childWrap = document.createElement('div');
      childWrap.className = 'tree-children hidden';

      if (hasChildren) {
        buildTree(node.children, childWrap);
        icon.addEventListener('click', function(e) {
          e.stopPropagation();
          const hidden = childWrap.classList.toggle('hidden');
          icon.textContent = hidden ? '▶' : '▼';
        });
      }

      row.addEventListener('click', function() {
        if (node.hasSlide) {
          navigate(node.id);
        } else {
          const first = firstSlide(node.children || []);
          if (first) navigate(first.id);
          if (hasChildren) {
            childWrap.classList.remove('hidden');
            icon.textContent = '▼';
          }
        }
      });

      wrap.appendChild(row);
      wrap.appendChild(childWrap);
      container.appendChild(wrap);
    });
  }

  // Load sidebar state before building tree
  loadSidebarState();

  const root = document.getElementById('tree-root');
  buildTree(data.tree, root);

  // Add listener before navigating
  frame.addEventListener('load', scaleFrame);

  const first = firstSlide(data.tree);
  if (first) {
    navigate(first.id);
    document.querySelectorAll('.tree-children').forEach(el => {
      el.classList.remove('hidden');
    });
    document.querySelectorAll('.tree-node .icon').forEach(el => {
      if (el.textContent === '▶') el.textContent = '▼';
    });
    navigate(first.id);
  }
})();
  </script>
</body>
</html>
