  buildItems(data.tree, navRoot, true);

  /* ── Footer slide count ── */
  const footerEl = document.getElementById('nav-footer-text');
  footerEl.textContent = slideCount + ' slide' + (slideCount !== 1 ? 's' : '');

  /* ── Boot: navigate to first slide, expand all ── */
  const first = firstSlide(data.tree);
  if (first) navigate(first.id);

})();
  </script>
</body>
</html>
